<!DOCTYPE html>
<html>
<head>
  <title>IdeModel</title>

  <!-- Cytoscape -->
  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- 🌐 WRAPPER -->
  <div id="graph-wrapper"></div>

  <!-- 🧠 GRAFO FULL SCREEN -->
  <div id="graph"></div>

  <!-- 🏷 LABELS -->
  <div id="node-label-layer"></div>

  <!-- 🫧 UI SUPERIOR -->
  <div id="top-ui">

    <!-- 🔘 LOGO -->
    <div id="logo-btn" class="round-btn">
      <img src="assets/idemodel-bulb.svg" />
    </div>

    <!-- 🧠 TITLE BLOCK -->
    <div id="model-title-block">

      <!-- 👇 NUEVO -->
      <div id="app-name">idemodel</div>

      <!-- ✏️ MODEL NAME -->
      <input id="model-name" placeholder="Model Name" />

    </div>

  </div>

  <!-- ➕ ADD NODE -->
  <div id="add-node-btn" class="round-btn">
    <div class="plus">+</div>
  </div>

  <!-- ⏱ TIME UI -->
  <div id="time-ui">

    <!-- 🔘 CÍRCULO -->
    <div id="time-circle" class="round-btn">
      <span id="time-value">1</span>
      <div id="time-badge">1</div>
    </div>

    <!-- 🧠 CONTROL -->
    <div id="time-controls">

      <div id="time-label">TIME</div>

      <input id="time-slider" type="range" min="1" max="1" value="1" />

      <div id="time-nav">
        <span data-action="prev">◀</span>
        <span data-action="next">▶</span>
      </div>

    </div>

  </div>

  <!-- ⚙️ SETTINGS -->
  <div id="settings-btn" class="round-btn">
    <svg viewBox="0 0 24 24">
      <line x1="4" y1="6" x2="20" y2="6" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="10" cy="6" r="2" fill="white"/>

      <line x1="4" y1="12" x2="20" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="14" cy="12" r="2" fill="white"/>

      <line x1="4" y1="18" x2="20" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="8" cy="18" r="2" fill="white"/>
    </svg>
  </div>

  <!-- PANEL INFERIOR -->
  <div id="bottom-panel">
    <div id="panel-header">
      <div id="panel-title">Panel</div>
      <div id="panel-close" onclick="closePanel()">✕</div>
    </div>
    <div id="panel-content">
      <div id="panel-inner"></div>
    </div>
  </div>

  <!-- scripts -->
  <script src="js/engine.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/api.js"></script>

  <!-- 🔥 AUTO LOAD -->
  <script>
    window.addEventListener("load", () => {
      loadData();
    });
  </script>

</body>
</html>
