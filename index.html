<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

</head>

<body>

<h2>idemdodel</h2>

<div style="display:flex; flex-direction:column; height:100vh">

<div id="cy" style="height:50%; border:1px solid #68777e;"></div>

<iframe
src="https://docs.google.com/spreadsheets/d/1ueA3rlAOzI7nemlilQiXh0r45O-d6SOu3pkxh9USqn4/edit?gid=0#gid=0&range=A1:F4"
style="height:50%; width:100%; border:none;">
</iframe>

</div>



<script>

async function loadModel(){

const nodesCSV = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT43b07k8koGYDSYEFIC3ibPUaPQAsJ8VBi15AXwH7YQNd6tyYUG0_Id2yHgf3eo1SXcy-AdLr3h_CY/pub?gid=0&single=true&output=csv").then(r=>r.text())
const edgesCSV = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT43b07k8koGYDSYEFIC3ibPUaPQAsJ8VBi15AXwH7YQNd6tyYUG0_Id2yHgf3eo1SXcy-AdLr3h_CY/pub?gid=527960938&single=true&output=csv").then(r=>r.text())

const nodes = parseNodes(nodesCSV)
const edges = parseEdges(edgesCSV)

initGraph(nodes,edges)

}

function parseNodes(csv){

const lines = csv.trim().split("\n")

return lines.slice(1).map(l=>{

const c = l.split(",")

return {
data:{
id:c[0],
label:c[1]
},
position:{
x:parseFloat(c[4]) || Math.random()*600,
y:parseFloat(c[5]) || Math.random()*400
}
}

})

}

function parseEdges(csv){

const lines = csv.trim().split("\n")

return lines.slice(1).map(l=>{

const c = l.split(",")

return {
data:{
source:c[0],
target:c[1]
}
}

})

}

function initGraph(nodes,edges){

var cy = cytoscape({

container: document.getElementById('cy'),

elements:[
...nodes,
...edges
],

layout:{
name:"preset"
},

style:[

{
selector:"node",
style:{
'label':'data(label)',
'background-color':'#2E86AB',
'color':'white',
'text-valign':'center',
'text-halign':'center'
}
},

{
selector:"edge",
style:{
'width':2,
'line-color':'#999',
'target-arrow-shape':'triangle',
'target-arrow-color':'#999',
'curve-style':'bezier'
}
}

]

})

cy.nodes().forEach(node => {
node.grabbable(true)
})

cy.on('dragfree','node', function(evt){

const node = evt.target

console.log(
node.id(),
node.position()
)

})

cy.on('tap','node', function(evt){

const node = evt.target

alert(node.data('label'))

})

}


loadModel()

</script>

</body>

</html>
