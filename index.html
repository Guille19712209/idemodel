
<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

#cy{
height:60%;
border-bottom:1px solid #ccc;
}

#sheet{
height:40%;
}

iframe{
width:100%;
height:100%;
border:none;
}

#status{
position:absolute;
top:10px;
right:10px;
background:white;
padding:5px 10px;
border-radius:6px;
font-size:12px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div id="cy"></div>

<div id="sheet">
<iframe src="https://docs.google.com/spreadsheets/d/1ueA3rlAOzI7nemlilQiXh0r45O-d6SOu3pkxh9USqn4/edit?"></iframe>
</div>

<div id="status">cargando...</div>

<script>

const nodesURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT43b07k8koGYDSYEFIC3ibPUaPQAsJ8VBi15AXwH7YQNd6tyYUG0_Id2yHgf3eo1SXcy-AdLr3h_CY/pub?gid=0&single=true&output=csv";
const edgesURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT43b07k8koGYDSYEFIC3ibPUaPQAsJ8VBi15AXwH7YQNd6tyYUG0_Id2yHgf3eo1SXcy-AdLr3h_CY/pub?gid=527960938&single=true&output=csv";
const modelURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT43b07k8koGYDSYEFIC3ibPUaPQAsJ8VBi15AXwH7YQNd6tyYUG0_Id2yHgf3eo1SXcy-AdLr3h_CY/pub?gid=2047107029&single=true&output=csv"

let cy

async function loadCSV(url){

const res = await fetch(url + "&t=" + Date.now())
const text = await res.text()

return text
.split("\n")
.map(r => r.split(","))

}

async function init(){

const nodes = await loadCSV(nodesURL)
const edges = await loadCSV(edgesURL)

const nodeElements = nodes.slice(1).map(r => ({
data:{
id:r[0],
label:r[1]
}
}))

const edgeElements = edges.slice(1).map(r => ({
data:{
source:r[0],
target:r[1]
}
}))

cy = cytoscape({

container: document.getElementById("cy"),

elements:[
...nodeElements,
...edgeElements
],

style:[

{
selector:'node',
style:{
'label':'data(label)',
'text-valign':'center',
'background-color':'#2E86DE',
'color':'white',
'font':'12px'

}
},

{
selector:'edge',
style:{
'curve-style':'bezier',
'target-arrow-shape':'triangle'
}
}

],

layout:{ name:'cose' }

})

loadModel()

setInterval(loadModel,5000)

}

async function loadModel(){

const rows = await loadCSV(modelURL)

const header = rows[0]
const period = 1

rows.slice(1).forEach(r => {

let id = r[0]
let value = r[period]

let node = cy.getElementById(id)

if(node){

node.data("label", node.data("label").split("\n")[0] + "\n" + value)

}

})

document.getElementById("status").innerText =
"actualizado " + new Date().toLocaleTimeString()

}

init()

</script>

</body>

</html>
