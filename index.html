<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

<style>
body{
font-family:Arial;
margin:0;
}

#cy{
width:100%;
height:100vh;
}
</style>

</head>

<body>

<div id="cy"></div>

<script>

const nodesURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT43b07k8koGYDSYEFIC3ibPUaPQAsJ8VBi15AXwH7YQNd6tyYUG0_Id2yHgf3eo1SXcy-AdLr3h_CY/pub?gid=0&single=true&output=csv";
const edgesURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT43b07k8koGYDSYEFIC3ibPUaPQAsJ8VBi15AXwH7YQNd6tyYUG0_Id2yHgf3eo1SXcy-AdLr3h_CY/pub?gid=527960938&single=true&output=csv";

async function loadCSV(url){

const res = await fetch(url);
const text = await res.text();

const rows = text.split("\n").slice(1);

return rows
.filter(r => r.trim() !== "")
.map(r => r.split(","));

}

async function init(){

const nodesData = await loadCSV(nodesURL);
const edgesData = await loadCSV(edgesURL);

const nodes = nodesData.map(r => ({
data:{
id:r[0],
label:r[1]
}
}));

const edges = edgesData.map(r => ({
data:{
source:r[0],
target:r[1],
label:r[2]
}
}));

const cy = cytoscape({

container: document.getElementById('cy'),

elements:[
...nodes,
...edges
],

style:[

{
selector:'node',
style:{
'label':'data(label)',
'background-color':'#0074D9',
'text-valign':'center',
'color':'white'
}
},

{
selector:'edge',
style:{
'label':'data(label)',
'curve-style':'bezier',
'target-arrow-shape':'triangle',
'line-color':'#aaa',
'target-arrow-color':'#aaa'
}
}

],

layout:{
name:'cose'
}

});

}

init();

</script>

</body>
</html>
