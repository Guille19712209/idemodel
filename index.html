<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

#cy{
height:60%;
border-bottom:1px solid #ccc;
}

#sheet{
height:40%;
}

iframe{
width:100%;
height:100%;
border:none;
}

#status{
position:absolute;
top:10px;
right:10px;
background:white;
padding:5px 10px;
border-radius:6px;
font-size:12px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div id="cy"></div>

<div id="sheet">
<iframe src="https://docs.google.com/spreadsheets/d/1ueA3rlAOzI7nemlilQiXh0r45O-d6SOu3pkxh9USqn4/edit?"></iframe>
</div>

<div id="status">cargando...</div>

<script>

const sheetID = "1ueA3rlAOzI7nemlilQiXh0r45O-d6SOu3pkxh9USqn4"

const nodesURL =
`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=nodes`

const edgesURL =
`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=edges`

const modelURL =
`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=model`

let cy

let nodeLabels = {}

const period = 1



async function loadSheet(url){

 const res = await fetch(url + "&t=" + Date.now())

 const text = await res.text()

 const json = JSON.parse(text.substring(47).slice(0,-2))

 const rows = json.table.rows.map(r =>
   r.c.map(c => c ? c.v : "")
 )

 return rows

}



async function init(){

const nodesRows = await loadSheet(nodesURL)
const edgesRows = await loadSheet(edgesURL)



const nodeElements = nodesRows
.filter(r => r[0])
.map(r => {

nodeLabels[r[0]] = r[1]

return {

data:{
id:String(r[0]),
label:r[1]
}

}

})



const edgeElements = edgesRows
.filter(r => r[0] && r[1])
.map(r => ({

data:{
source:String(r[0]),
target:String(r[1])
}

}))



cy = cytoscape({

container: document.getElementById("cy"),

elements:[
...nodeElements,
...edgeElements
],

style:[

{
selector:'node',
style:{
'label':'data(label)',
'text-valign':'center',
'text-halign':'center',
'background-color':'#2E86DE',
'color':'white',
'text-wrap':'wrap'
}
},

{
selector:'edge',
style:{
'curve-style':'bezier',
'target-arrow-shape':'triangle',
'line-color':'#aaa',
'target-arrow-color':'#aaa'
}
}

],

layout:{
name:'cose'
}

})



loadModel()

setInterval(loadModel,2000)

}



async function loadModel(){

const rows = await loadSheet(modelURL)



rows
.filter(r => r[0])
.forEach(r => {

let id = String(r[0])

let value = r[period]

let node = cy.getElementById(id)

if(node.length){

node.data("label",
nodeLabels[id] + "\n" + value
)

}

})



document.getElementById("status").innerText =
"actualizado " + new Date().toLocaleTimeString()

}



init()

</script>

</body>

</html>
